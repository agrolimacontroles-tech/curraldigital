<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopBoi — Lotes</title>
<link rel="icon" href="logo-agrolima.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>

<script src="supabase-config.js"></script>
<script src="layout.js"></script>
<script>
renderTopbarSidebar('lotes');

document.getElementById('mainContent').innerHTML = `
  <div class="pagehead">
    <div>
      <div class="pagetitle">Lotes</div>
      <div class="pagesub" id="totalLotes">Carregando...</div>
    </div>
  </div>

  <div class="subtoggle">
    <button class="stbtn active" id="btnTabDashboard" onclick="mostrarAba('dashboard')">Dashboard</button>
    <button class="stbtn" id="btnTabLista" onclick="mostrarAba('lista')">Lista de lotes</button>
    <button class="stbtn" id="btnTabCadastro" onclick="mostrarAba('cadastro')">Cadastrar lote</button>
  </div>

  <div id="abaLista" style="display:none">
    <div class="card">
      <div class="cardb table-wrap">
        <table>
          <thead>
            <tr><th>Lote</th><th>Fazenda</th><th>Categoria</th><th>Animais ativos</th><th>Peso total</th><th>GMD médio</th><th></th></tr>
          </thead>
          <tbody id="tabelaLotes">
            <tr class="empty-row"><td colspan="7"><span class="spinner"></span> Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="abaCadastro" style="display:none">
    <div id="msgCadastro" class="msg"></div>
    <div class="card">
      <div class="cardh">Identificação</div>
      <div class="cardb">
        <div class="frow cols-3">
          <div class="fgroup"><label>Nome do lote *</label><input id="l_nome" placeholder="Lote 01 - Recria"></div>
          <div class="fgroup">
            <label>Fazenda *</label>
            <select id="l_fazenda_id"><option value="">Carregando fazendas...</option></select>
          </div>
          <div class="fgroup">
            <label>Categoria</label>
            <select id="l_categoria">
              <option value="">Selecione...</option>
              <option>Bezerro</option>
              <option>Garrote</option>
              <option>Novilho</option>
              <option>Boi</option>
              <option>Vaca</option>
              <option>Misto</option>
            </select>
          </div>
        </div>
        <div class="frow cols-3">
          <div class="fgroup"><label>Data de formação</label><input id="l_data_formacao" type="date"></div>
          <div class="fgroup"></div>
          <div class="fgroup"></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" id="btnSalvarLote">Cadastrar lote</button>
          <button class="btn btn-secondary" onclick="limparFormulario()">Limpar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="abaDashboard">
    <div class="toolbar">
      <select id="filtroFazendaDashLote" onchange="aoMudarFazendaDashLote()"><option value="">Todas as fazendas</option></select>
      <select id="filtroLoteDash" onchange="renderDashboardLote()"><option value="">Todos os lotes</option></select>
    </div>

    <div class="metrics" id="metricasDashLote">
      <div class="metric"><span class="spinner"></span></div>
    </div>
    <div class="metrics" id="metricasDashLote2" style="margin-top:-4px"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card">
        <div class="cardh"><i class="ti ti-chart-donut"></i> Composição do lote</div>
        <div class="cardb" style="display:flex;justify-content:center"><div style="max-width:220px;width:100%"><canvas id="chartComposicaoLote"></canvas></div></div>
      </div>
      <div class="card">
        <div class="cardh"><i class="ti ti-building-warehouse"></i> Animais por fazenda</div>
        <div class="cardb" id="conteudoFazendasLote"><span class="spinner"></span></div>
      </div>
    </div>
  </div>
`;

let loteEditandoId = null;

function mostrarAba(aba) {
  document.getElementById('abaLista').style.display = aba === 'lista' ? 'block' : 'none';
  document.getElementById('abaCadastro').style.display = aba === 'cadastro' ? 'block' : 'none';
  document.getElementById('abaDashboard').style.display = aba === 'dashboard' ? 'block' : 'none';
  document.getElementById('btnTabLista').classList.toggle('active', aba === 'lista');
  document.getElementById('btnTabCadastro').classList.toggle('active', aba === 'cadastro');
  document.getElementById('btnTabDashboard').classList.toggle('active', aba === 'dashboard');
  if (aba === 'lista') carregarLotes();
  if (aba === 'cadastro') carregarFazendasNoSelect();
  if (aba === 'dashboard') carregarDashboardLotes();
}

function limparFormulario() {
  loteEditandoId = null;
  document.getElementById('l_nome').value = '';
  document.getElementById('l_fazenda_id').value = '';
  document.getElementById('l_categoria').value = '';
  document.getElementById('l_data_formacao').value = new Date().toISOString().slice(0, 10);
  document.getElementById('btnSalvarLote').textContent = 'Cadastrar lote';
  document.getElementById('msgCadastro').className = 'msg';
}

function showMsg(text, type) {
  const el = document.getElementById('msgCadastro');
  el.textContent = text;
  el.className = 'msg show ' + type;
  setTimeout(() => { el.className = 'msg'; }, 4000);
}

async function carregarFazendasNoSelect() {
  const sel = document.getElementById('l_fazenda_id');
  const valorAtual = sel.value;

  const { data: fazendas, error } = await supabaseClient
    .from('fazendas')
    .select('id, nome')
    .order('nome');

  if (error) {
    sel.innerHTML = `<option value="">Erro ao carregar fazendas</option>`;
    return;
  }

  if (!fazendas || fazendas.length === 0) {
    sel.innerHTML = `<option value="">Nenhuma fazenda cadastrada — cadastre uma primeiro</option>`;
    return;
  }

  sel.innerHTML = `<option value="">Selecione...</option>` +
    fazendas.map(f => `<option value="${f.id}">${f.nome}</option>`).join('');

  if (valorAtual) sel.value = valorAtual;
}

async function carregarLotes() {
  const { data: lotes, error } = await supabaseClient
    .from('vw_lotes_resumo')
    .select('*')
    .order('nome');

  if (error) {
    document.getElementById('tabelaLotes').innerHTML = `<tr class="empty-row"><td colspan="7">Erro ao carregar: ${error.message}</td></tr>`;
    return;
  }

  document.getElementById('totalLotes').textContent = `${lotes.length} lote${lotes.length === 1 ? '' : 's'} cadastrado${lotes.length === 1 ? '' : 's'}`;

  if (lotes.length === 0) {
    document.getElementById('tabelaLotes').innerHTML = '<tr class="empty-row"><td colspan="7">Nenhum lote cadastrado ainda.</td></tr>';
    return;
  }

  document.getElementById('tabelaLotes').innerHTML = lotes.map(l => `
    <tr>
      <td><b style="color:var(--text)">${l.nome}</b></td>
      <td>${l.fazenda_nome || '—'}</td>
      <td>${l.categoria ? `<span class="badge bg-info">${l.categoria}</span>` : '—'}</td>
      <td>${l.animais_ativos || 0}</td>
      <td>${l.peso_total !== null ? Number(l.peso_total).toLocaleString('pt-BR') + ' kg' : '—'}</td>
      <td>${l.gmd_medio !== null ? Number(l.gmd_medio).toFixed(2) + ' kg/d' : '—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary" style="padding:4px 10px" onclick="editarLote('${l.id}')"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-danger" style="padding:4px 10px" onclick="excluirLote('${l.id}','${l.nome.replace(/'/g, "\\'")}')"><i class="ti ti-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

async function editarLote(id) {
  const { data: l, error } = await supabaseClient.from('lotes').select('*').eq('id', id).single();
  if (error) { alert('Erro ao carregar lote: ' + error.message); return; }

  loteEditandoId = id;
  mostrarAba('cadastro');

  await carregarFazendasNoSelect();

  document.getElementById('l_nome').value = l.nome || '';
  document.getElementById('l_fazenda_id').value = l.fazenda_id || '';
  document.getElementById('l_categoria').value = l.categoria || '';
  document.getElementById('l_data_formacao').value = l.data_formacao || '';
  document.getElementById('btnSalvarLote').textContent = 'Salvar alterações';
}

async function excluirLote(id, nome) {
  if (!confirm(`Excluir o "${nome}"? Essa ação não pode ser desfeita.`)) return;

  const { error } = await supabaseClient.from('lotes').delete().eq('id', id);
  if (error) {
    alert('Não foi possível excluir: ' + error.message + '\n\nVerifique se ainda existem animais vinculados a esse lote.');
    return;
  }
  carregarLotes();
}

async function salvarLote() {
  const nome = document.getElementById('l_nome').value.trim();
  const fazendaId = document.getElementById('l_fazenda_id').value;

  if (!nome) { showMsg('O nome do lote é obrigatório.', 'error'); return; }
  if (!fazendaId) { showMsg('Selecione a fazenda.', 'error'); return; }

  const payload = {
    nome,
    fazenda_id: fazendaId,
    categoria: document.getElementById('l_categoria').value || null,
    data_formacao: document.getElementById('l_data_formacao').value || null,
  };

  const btn = document.getElementById('btnSalvarLote');
  btn.disabled = true;

  let error;
  if (loteEditandoId) {
    ({ error } = await supabaseClient.from('lotes').update(payload).eq('id', loteEditandoId));
  } else {
    ({ error } = await supabaseClient.from('lotes').insert(payload));
  }

  btn.disabled = false;

  if (error) {
    const msg = error.code === '23505'
      ? 'Já existe um lote com esse nome nessa fazenda.'
      : 'Erro ao salvar: ' + error.message;
    showMsg(msg, 'error');
    return;
  }

  showMsg(loteEditandoId ? 'Lote atualizado com sucesso!' : 'Lote cadastrado com sucesso!', 'success');
  limparFormulario();
  mostrarAba('lista');
}

document.getElementById('btnSalvarLote').addEventListener('click', salvarLote);

// ---------- Dashboard ----------
const PALETA_CATEGORIAS = {
  'Bezerro': '#4a9eff', 'Bezerra': '#ff8fb3', 'Garrote': '#f0b840', 'Novilho': '#4dd4a0',
  'Novilha': '#a87fe0', 'Boi': '#1a4a8a', 'Vaca': '#d63b6e', 'Touro': '#2d6e4e',
  'Matrona': '#8a5a2b', 'Vaca seca': '#7a7a7a', 'Sem categoria': '#5a7fa0',
};
function categoriaLabelDash(c) { return c || 'Sem categoria'; }
function corCategoriaDash(c) { return PALETA_CATEGORIAS[categoriaLabelDash(c)] || '#5a7fa0'; }

let lotesCacheDash = [];
let fazendasCacheDashLote = [];
let animaisCacheDash = [];
let chartComposicaoLoteInstance = null;

async function carregarDashboardLotes() {
  const [{ data: lotes }, { data: fazendas }, animais, pesagens] = await Promise.all([
    supabaseClient.from('lotes').select('id, nome, fazenda_id').order('nome'),
    supabaseClient.from('fazendas').select('id, nome').order('nome'),
    buscarPaginado(() => supabaseClient.from('vw_animais_resumo').select('*')),
    buscarPaginado(() => supabaseClient.from('pesagens').select('animal_id, data_pesagem, gmd_periodo').order('data_pesagem', { ascending: false })),
  ]);

  lotesCacheDash = lotes || [];
  fazendasCacheDashLote = fazendas || [];

  const gmdPeriodoPorAnimal = new Map();
  (pesagens || []).forEach(p => {
    if (!gmdPeriodoPorAnimal.has(p.animal_id)) gmdPeriodoPorAnimal.set(p.animal_id, p.gmd_periodo);
  });

  animaisCacheDash = (animais || []).map(a => ({
    ...a,
    gmdt: a.gmd_atual,
    gmd_ultimo: gmdPeriodoPorAnimal.has(a.id) ? gmdPeriodoPorAnimal.get(a.id) : null,
  }));

  const selFazenda = document.getElementById('filtroFazendaDashLote');
  selFazenda.innerHTML = `<option value="">Todas as fazendas</option>` +
    fazendasCacheDashLote.map(f => `<option value="${f.id}">${f.nome}</option>`).join('');

  popularSelectLotesDash();
  renderDashboardLote();
}

function popularSelectLotesDash() {
  const fazendaId = document.getElementById('filtroFazendaDashLote').value;
  const sel = document.getElementById('filtroLoteDash');
  const valorAtual = sel.value;

  const lotesDisponiveis = fazendaId ? lotesCacheDash.filter(l => l.fazenda_id === fazendaId) : lotesCacheDash;

  sel.innerHTML = `<option value="">Todos os lotes</option>` +
    lotesDisponiveis.map(l => `<option value="${l.id}">${l.nome}</option>`).join('');

  if (valorAtual && lotesDisponiveis.some(l => l.id === valorAtual)) sel.value = valorAtual;
}

function aoMudarFazendaDashLote() {
  popularSelectLotesDash();
  renderDashboardLote();
}

function renderDashboardLote() {
  const fazendaId = document.getElementById('filtroFazendaDashLote').value;
  const loteId = document.getElementById('filtroLoteDash').value;

  const lotesNoFiltro = lotesCacheDash.filter(l =>
    (!fazendaId || l.fazenda_id === fazendaId) && (!loteId || l.id === loteId)
  );

  const todosNoFiltro = animaisCacheDash.filter(a =>
    (!fazendaId || a.fazenda_id === fazendaId) && (!loteId || a.lote_id === loteId)
  );
  const ativos = todosNoFiltro.filter(a => a.status === 'ativo');
  const mortos = todosNoFiltro.filter(a => a.status === 'morto');

  const pesoTotal = ativos.reduce((s, a) => s + (Number(a.peso_atual) || 0), 0);
  const pesoMedio = ativos.length ? pesoTotal / ativos.length : 0;

  const gmdValidos = ativos.filter(a => a.gmd_ultimo !== null).map(a => Number(a.gmd_ultimo));
  const gmdMedio = gmdValidos.length ? gmdValidos.reduce((s, v) => s + v, 0) / gmdValidos.length : 0;

  const gmdtValidos = ativos.filter(a => a.gmdt !== null).map(a => Number(a.gmdt));
  const gmdtMedio = gmdtValidos.length ? gmdtValidos.reduce((s, v) => s + v, 0) / gmdtValidos.length : 0;

  const fazendasNoLote = new Set(ativos.map(a => a.fazenda_id).filter(Boolean));

  document.getElementById('metricasDashLote').innerHTML = `
    <div class="metric">
      <div class="micon bg-info"><i class="ti ti-stack-2"></i></div>
      <div><div class="mlabel">Lotes</div><div class="mval">${lotesNoFiltro.length}</div></div>
    </div>
    <div class="metric">
      <div class="micon bg-info"><i class="ti ti-tag"></i></div>
      <div><div class="mlabel">Animais ativos</div><div class="mval">${ativos.length}</div></div>
    </div>
    <div class="metric">
      <div class="micon bg-success"><i class="ti ti-weight"></i></div>
      <div><div class="mlabel">Peso total</div><div class="mval">${pesoTotal.toLocaleString('pt-BR')} kg</div></div>
    </div>
    <div class="metric">
      <div class="micon bg-info"><i class="ti ti-scale"></i></div>
      <div><div class="mlabel">Peso médio</div><div class="mval">${pesoMedio.toFixed(0)} kg</div></div>
    </div>
  `;

  document.getElementById('metricasDashLote2').innerHTML = `
    <div class="metric">
      <div class="micon bg-warning"><i class="ti ti-chart-line"></i></div>
      <div><div class="mlabel">Último GMD</div><div class="mval">${gmdMedio.toFixed(2)} kg/dia</div></div>
    </div>
    <div class="metric">
      <div class="micon bg-warning"><i class="ti ti-trending-up"></i></div>
      <div><div class="mlabel">GMDT (desde a entrada)</div><div class="mval">${gmdtMedio.toFixed(2)} kg/dia</div></div>
    </div>
    <div class="metric">
      <div class="micon bg-danger"><i class="ti ti-skull"></i></div>
      <div><div class="mlabel">Mortos</div><div class="mval">${mortos.length}</div></div>
    </div>
    <div class="metric">
      <div class="micon bg-info"><i class="ti ti-building-warehouse"></i></div>
      <div><div class="mlabel">Fazendas envolvidas</div><div class="mval">${fazendasNoLote.size}</div></div>
    </div>
  `;

  renderComposicaoLote(ativos);
  renderFazendasLote(ativos);
}

function renderComposicaoLote(ativos) {
  const porCategoria = {};
  ativos.forEach(a => {
    const c = categoriaLabelDash(a.categoria);
    porCategoria[c] = (porCategoria[c] || 0) + 1;
  });
  const categorias = Object.keys(porCategoria);

  if (chartComposicaoLoteInstance) chartComposicaoLoteInstance.destroy();
  const ctx = document.getElementById('chartComposicaoLote');
  if (categorias.length === 0) {
    ctx.getContext('2d').clearRect(0, 0, ctx.width, ctx.height);
    return;
  }

  chartComposicaoLoteInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: categorias,
      datasets: [{
        data: categorias.map(c => porCategoria[c]),
        backgroundColor: categorias.map(c => corCategoriaDash(c)),
        borderWidth: 0,
      }],
    },
    plugins: [ChartDataLabels],
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 1,
      plugins: {
        legend: { position: 'bottom', labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-soft'), boxWidth: 10, font: { size: 10 } } },
        datalabels: {
          color: '#fff',
          font: { weight: 'bold', size: 11 },
          formatter: (valor, contexto) => {
            const total = contexto.dataset.data.reduce((s, v) => s + v, 0);
            const pct = total > 0 ? (valor / total) * 100 : 0;
            return pct >= 5 ? pct.toFixed(0) + '%' : '';
          },
        },
      },
    },
  });
}

function renderFazendasLote(ativos) {
  const porFazenda = {};
  ativos.forEach(a => {
    const nome = a.fazenda_nome || 'Sem fazenda';
    porFazenda[nome] = (porFazenda[nome] || 0) + 1;
  });

  const grupos = Object.entries(porFazenda).map(([nome, qtd]) => ({ nome, qtd }));
  const maxQtd = Math.max(1, ...grupos.map(g => g.qtd));

  document.getElementById('conteudoFazendasLote').innerHTML = grupos.length === 0
    ? '<p style="color:var(--text-dim);font-size:13px">Nenhum animal ativo nessa seleção.</p>'
    : grupos.map(g => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:12px;color:var(--text-soft);min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.nome}</span>
          <div style="background:var(--track-bg);border-radius:3px;height:14px;flex:1;overflow:hidden">
            <div style="height:100%;border-radius:3px;width:${(g.qtd / maxQtd) * 100}%;background:var(--accent-bg)"></div>
          </div>
          <span style="font-size:12px;color:var(--text);min-width:24px;text-align:right">${g.qtd}</span>
        </div>
      `).join('');
}

(async function init() {
  await checkAuth();
  showUserEmail();
  document.getElementById('l_data_formacao').value = new Date().toISOString().slice(0, 10);
  carregarLotes();
  carregarDashboardLotes();
})();
</script>

</body>
</html>
