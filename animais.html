let animalEditandoId = null;
let animaisCache = [];
let acaoAnimalId = null;
let acaoAnimalBrinco = null;

// ---------- Navegação entre abas ----------
function mostrarAba(aba) {
  document.getElementById('abaLista').style.display = aba === 'lista' ? 'block' : 'none';
  document.getElementById('abaCadastro').style.display = aba === 'cadastro' ? 'block' : 'none';
  document.getElementById('abaImportar').style.display = aba === 'importar' ? 'block' : 'none';
  document.getElementById('btnTabLista').classList.toggle('active', aba === 'lista');
  document.getElementById('btnTabCadastro').classList.toggle('active', aba === 'cadastro');
  document.getElementById('btnTabImportar').classList.toggle('active', aba === 'importar');
  if (aba === 'lista') carregarAnimais();
  if (aba === 'cadastro') carregarSelectsCadastro();
}

function mostrarSubImportar(sub) {
  document.getElementById('subImportarAnimais').style.display = sub === 'animais' ? 'block' : 'none';
  document.getElementById('subImportarPesagens').style.display = sub === 'pesagens' ? 'block' : 'none';
  document.getElementById('btnSubImportarAnimais').classList.toggle('active', sub === 'animais');
  document.getElementById('btnSubImportarPesagens').classList.toggle('active', sub === 'pesagens');
}

function limparFormulario() {
  animalEditandoId = null;
  ['a_brinco','a_sexo','a_categoria','a_raca','a_pelagem','a_marca','a_fazenda_id','a_lote_id','a_manga_id',
   'a_data_nascimento','a_data_desmame','a_produtor_origem','a_compra_id','a_peso_entrada','a_preco_compra_kg',
   'a_frete_compra','a_observacoes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('a_castrado').checked = false;
  document.getElementById('a_custo_total').value = '';
  document.getElementById('a_custo_por_kg').value = '';
  document.getElementById('a_idade_meses').value = '';
  infoComissaoCompra = null;
  document.getElementById('a_data_entrada').value = new Date().toISOString().slice(0, 10);
  document.getElementById('btnSalvarAnimal').textContent = 'Cadastrar animal';
  document.getElementById('msgCadastro').className = 'msg';
}

function showMsg(elId, text, type) {
  const el = document.getElementById(elId);
  el.textContent = text;
  el.className = 'msg show ' + type;
  setTimeout(() => { el.className = 'msg'; }, 4000);
}

// ---------- Selects (fazenda / lote / manga) ----------
async function carregarSelectsCadastro() {
  const selFazenda = document.getElementById('a_fazenda_id');
  const valorAtual = selFazenda.value;

  const { data: fazendas, error } = await supabaseClient.from('fazendas').select('id, nome').order('nome');

  if (error) {
    selFazenda.innerHTML = `<option value="">Erro ao carregar fazendas</option>`;
    return;
  }
  if (!fazendas || fazendas.length === 0) {
    selFazenda.innerHTML = `<option value="">Nenhuma fazenda cadastrada — cadastre uma primeiro</option>`;
    return;
  }

  selFazenda.innerHTML = `<option value="">Selecione...</option>` +
    fazendas.map(f => `<option value="${f.id}">${f.nome}</option>`).join('');

  if (valorAtual) selFazenda.value = valorAtual;

  const selCompra = document.getElementById('a_compra_id');
  const { data: compras } = await supabaseClient
    .from('compras')
    .select('id, data_compra, vendedor, nota_fiscal')
    .order('data_compra', { ascending: false });

  selCompra.innerHTML = `<option value="">Sem vínculo / compra individual</option>` +
    (compras || []).map(c => {
      const data = new Date(c.data_compra + 'T00:00:00').toLocaleDateString('pt-BR');
      const label = [data, c.vendedor, c.nota_fiscal ? 'NF ' + c.nota_fiscal : null].filter(Boolean).join(' — ');
      return `<option value="${c.id}">${label}</option>`;
    }).join('');
}

async function carregarLotesEMangas(fazendaId, lotePreSelecionado, mangaPreSelecionado, idLote, idManga) {
  const selLote = document.getElementById(idLote || 'a_lote_id');
  const selManga = document.getElementById(idManga || 'a_manga_id');

  if (!fazendaId) {
    selLote.innerHTML = `<option value="">Selecione a fazenda primeiro</option>`;
    selManga.innerHTML = `<option value="">Selecione a fazenda primeiro</option>`;
    return;
  }

  selLote.innerHTML = `<option value="">Carregando...</option>`;
  selManga.innerHTML = `<option value="">Carregando...</option>`;

  const [{ data: lotes }, { data: mangas }] = await Promise.all([
    supabaseClient.from('lotes').select('id, nome').eq('fazenda_id', fazendaId).order('nome'),
    supabaseClient.from('mangas').select('id, numero').eq('fazenda_id', fazendaId).order('numero'),
  ]);

  selLote.innerHTML = `<option value="">Sem lote</option>` +
    (lotes || []).map(l => `<option value="${l.id}">${l.nome}</option>`).join('');
  selManga.innerHTML = `<option value="">Sem manga</option>` +
    (mangas || []).map(m => `<option value="${m.id}">Manga ${m.numero}</option>`).join('');

  if (lotePreSelecionado) selLote.value = lotePreSelecionado;
  if (mangaPreSelecionado) selManga.value = mangaPreSelecionado;
}

function recalcularIdade() {
  const nascimento = document.getElementById('a_data_nascimento').value;
  const entrada = document.getElementById('a_data_entrada').value;
  const el = document.getElementById('a_idade_meses');
  if (!nascimento || !entrada) { el.value = ''; return; }

  const dNasc = new Date(nascimento + 'T00:00:00');
  const dEntr = new Date(entrada + 'T00:00:00');
  if (dEntr < dNasc) { el.value = ''; return; }

  let meses = (dEntr.getFullYear() - dNasc.getFullYear()) * 12 + (dEntr.getMonth() - dNasc.getMonth());
  if (dEntr.getDate() < dNasc.getDate()) meses--;
  el.value = Math.max(0, meses) + ' meses';
}

// Guarda a comissão da compra vinculada e o peso dos OUTROS animais já ligados a ela,
// pra ratear a comissão por peso entre todos os animais da compra (esse animal incluso).
let infoComissaoCompra = null;

async function carregarInfoComissaoCompra(compraId) {
  if (!compraId) { infoComissaoCompra = null; recalcularCustoTotal(); return; }

  const [{ data: compra }, { data: outrosAnimais }] = await Promise.all([
    supabaseClient.from('compras').select('valor_comissao').eq('id', compraId).single(),
    supabaseClient.from('animais').select('peso_entrada').eq('compra_id', compraId).neq('id', animalEditandoId || '00000000-0000-0000-0000-000000000000'),
  ]);

  infoComissaoCompra = {
    valorComissao: Number(compra?.valor_comissao) || 0,
    pesoOutrosAnimais: (outrosAnimais || []).reduce((s, a) => s + (Number(a.peso_entrada) || 0), 0),
  };
  recalcularCustoTotal();
}

function recalcularCustoTotal() {
  const peso = parseFloat(document.getElementById('a_peso_entrada').value) || 0;
  const precoKg = parseFloat(document.getElementById('a_preco_compra_kg').value) || 0;
  const frete = parseFloat(document.getElementById('a_frete_compra').value) || 0;

  const custoBase = (peso && precoKg) ? (peso * precoKg + frete) : 0;
  document.getElementById('a_custo_total').value = custoBase ? custoBase.toFixed(2) : '';

  let comissaoRateada = 0;
  if (infoComissaoCompra && infoComissaoCompra.valorComissao > 0 && peso > 0) {
    const pesoTotalCompra = infoComissaoCompra.pesoOutrosAnimais + peso;
    if (pesoTotalCompra > 0) comissaoRateada = infoComissaoCompra.valorComissao * (peso / pesoTotalCompra);
  }

  const custoComComissao = custoBase + comissaoRateada;
  document.getElementById('a_custo_por_kg').value = (peso && custoComComissao) ? 'R$ ' + (custoComComissao / peso).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : '';
}

function aplicarFiltros() {
  const fazendaId = document.getElementById('filtroFazenda').value;
  const status = document.getElementById('filtroStatus').value;
  const busca = document.getElementById('filtroBusca').value.trim().toLowerCase();

  const filtrados = animaisCache.filter(a => {
    if (fazendaId && a.fazenda_id !== fazendaId) return false;
    if (status && a.status !== status) return false;
    if (busca && !String(a.brinco).toLowerCase().includes(busca)) return false;
    return true;
  });

  renderTabelaAnimais(filtrados);
}

function renderTabelaAnimais(lista) {
  if (lista.length === 0) {
    document.getElementById('tabelaAnimais').innerHTML = '<tr class="empty-row"><td colspan="9">Nenhum animal encontrado.</td></tr>';

  document.getElementById('tabelaAnimais').innerHTML = lista.map(a => {
    let statusBadge = '<span class="badge bg-success">Ativo</span>';
    if (a.status === 'vendido') statusBadge = '<span class="badge bg-info">Vendido</span>';
    else if (a.status === 'morto') statusBadge = '<span class="badge bg-danger">Morto</span>';

    const localizacao = [a.lote_nome, a.manga_numero ? `Manga ${a.manga_numero}` : null].filter(Boolean).join(' / ') || '—';
    const sexoCategoria = [a.sexo, a.categoria].filter(Boolean).join(' · ') || '—';
    const acoesAtivo = a.status === 'ativo' ? `
        <button class="btn btn-warning" style="padding:4px 10px" title="Transferir (fazenda/lote/manga)" onclick="abrirModalTransferencia('${a.id}','${a.brinco}')"><i class="ti ti-arrows-exchange"></i></button>

  const dataEntrada = document.getElementById('a_data_entrada').value;

  if (!fazendaId) { showMsg('msgCadastro', 'Selecione a fazenda.', 'error'); return; }
  if (!dataEntrada) { showMsg('msgCadastro', 'A data de entrada é obrigatória.', 'error'); return; }
  if (!pesoEntrada) { showMsg('msgCadastro', 'O peso de entrada é obrigatório.', 'error'); return; }

  const payload = {
    brinco,
    sexo,
    categoria: document.getElementById('a_categoria').value || null,
    raca: document.getElementById('a_raca').value.trim() || null,
    pelagem: document.getElementById('a_pelagem').value.trim() || null,
    marca: document.getElementById('a_marca').value.trim() || null,
    castrado: document.getElementById('a_castrado').checked,
    fazenda_id: fazendaId,
    lote_id: document.getElementById('a_lote_id').value || null,
    manga_id: document.getElementById('a_manga_id').value || null,
    data_nascimento: document.getElementById('a_data_nascimento').value || null,
    data_desmame: document.getElementById('a_data_desmame').value || null,
    data_entrada: dataEntrada,
    produtor_origem: document.getElementById('a_produtor_origem').value.trim() || null,
    compra_id: document.getElementById('a_compra_id').value || null,
    peso_entrada: Number(pesoEntrada),
    preco_compra_kg: document.getElementById('a_preco_compra_kg').value ? Number(document.getElementById('a_preco_compra_kg').value) : null,
    frete_compra: document.getElementById('a_frete_compra').value ? Number(document.getElementById('a_frete_compra').value) : 0,
    observacoes: document.getElementById('a_observacoes').value.trim() || null,
  };

  const btn = document.getElementById('btnSalvarAnimal');
  btn.disabled = true;

  let error;

}

// ---------- Importação de planilhas ----------
function normalizarTexto(s) {
  return String(s ?? '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function normalizarCabecalho(s) {
  return normalizarTexto(s).replace(/[^a-z0-9]/g, '');
}

function excelDateParaISO(valor) {
  if (valor === '' || valor === null || valor === undefined) return null;
  if (valor instanceof Date) {
    const ano = valor.getUTCFullYear();
    const mes = String(valor.getUTCMonth() + 1).padStart(2, '0');
    const dia = String(valor.getUTCDate()).padStart(2, '0');
    return `${ano}-${mes}-${dia}`;
  }
  if (typeof valor === 'number') {
    const d = XLSX.SSF.parse_date_code(valor);
    if (!d) return null;
    return `${d.y}-${String(d.m).padStart(2, '0')}-${String(d.d).padStart(2, '0')}`;
  }
  const texto = String(valor).trim();
  let m = texto.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
  m = texto.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
  return null;
}

function lerArquivoComoLinhas(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const matriz = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });
        if (matriz.length === 0) { resolve([]); return; }

        const mapaColunas = {};
        matriz[0].forEach((cabecalho, idx) => { mapaColunas[normalizarCabecalho(cabecalho)] = idx; });

        const linhas = [];
        for (let i = 1; i < matriz.length; i++) {
          const linhaBruta = matriz[i];
          const vazia = linhaBruta.every(v => v === '' || v === null || v === undefined);
          if (vazia) continue;
          const obj = { __linha: i + 1 };
          Object.entries(mapaColunas).forEach(([chave, idx]) => { obj[chave] = linhaBruta[idx]; });
          linhas.push(obj);
        }
        resolve(linhas);
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('Não foi possível ler o arquivo.'));
    reader.readAsArrayBuffer(file);
  });
}

function renderResultadoImportacao(tabelaId, cardId, resultados) {
  document.getElementById(cardId).style.display = 'block';
  document.getElementById(tabelaId).innerHTML = resultados.map(r => `

      <td>${r.status === 'ok'
        ? `<span class="badge bg-success">OK</span> ${r.motivo}`
        : `<span class="badge bg-danger">Erro</span> ${r.motivo}`}</td>
    </tr>
  `).join('');
}

async function processarPlanilhaAnimais() {
  const file = document.getElementById('arquivoAnimais').files[0];
  if (!file) { showMsg('msgImportAnimais', 'Selecione um arquivo .xlsx primeiro.', 'error'); return; }

  const btn = document.getElementById('btnProcessarAnimais');
  btn.disabled = true;
  showMsg('msgImportAnimais', 'Lendo planilha...', 'success');

  let linhas;
  try {
    linhas = await lerArquivoComoLinhas(file);
  } catch (err) {
    btn.disabled = false;
    showMsg('msgImportAnimais', 'Erro ao ler o arquivo: ' + err.message, 'error');
    return;
  }

  if (linhas.length === 0) {
    btn.disabled = false;
    showMsg('msgImportAnimais', 'A planilha não tem linhas de dados (ou só tem a linha de exemplo apagada).', 'error');
    return;
  }

  const [{ data: fazendas }, { data: lotes }, { data: mangas }] = await Promise.all([
    supabaseClient.from('fazendas').select('id, nome'),
    supabaseClient.from('lotes').select('id, nome, fazenda_id'),
    supabaseClient.from('mangas').select('id, numero, fazenda_id'),
  ]);

  const mapaFazendas = new Map((fazendas || []).map(f => [normalizarTexto(f.nome), f.id]));
  const mapaLotes = new Map((lotes || []).map(l => [`${l.fazenda_id}|${normalizarTexto(l.nome)}`, l.id]));
  const mapaMangas = new Map((mangas || []).map(m => [`${m.fazenda_id}|${normalizarTexto(m.numero)}`, m.id]));

  const categoriasValidas = ['Bezerro', 'Bezerra', 'Garrote', 'Novilho', 'Novilha', 'Boi', 'Vaca', 'Touro', 'Matrona', 'Vaca seca'];
  const mapaCategorias = new Map(categoriasValidas.map(c => [normalizarTexto(c), c]));

  const resultados = [];
  const validos = [];

  for (const linha of linhas) {
    const brinco = String(linha.brinco || '').trim();
    const erro = (msg) => resultados.push({ linha: linha.__linha, brinco: brinco || '—', status: 'erro', motivo: msg });

    if (!brinco) { erro('Brinco em branco.'); continue; }

    const sexoTexto = normalizarTexto(linha.sexo);
    let sexo = null;
    if (sexoTexto === 'macho') sexo = 'Macho';
    else if (sexoTexto === 'femea') sexo = 'Fêmea';
    if (!sexo) { erro('Sexo inválido (use Macho ou Fêmea).'); continue; }

    const fazendaNome = String(linha.fazenda || '').trim();
    if (!fazendaNome) { erro('Fazenda em branco.'); continue; }
    const fazendaId = mapaFazendas.get(normalizarTexto(fazendaNome));
    if (!fazendaId) { erro(`Fazenda "${fazendaNome}" não encontrada.`); continue; }

    const dataEntrada = excelDateParaISO(linha.dataentrada);
    if (!dataEntrada) { erro('Data de entrada inválida ou em branco.'); continue; }

    const pesoEntrada = parseFloat(String(linha.pesoentrada).replace(',', '.'));
    if (!pesoEntrada) { erro('Peso de entrada inválido ou em branco.'); continue; }

    let loteId = null;
    const loteNome = String(linha.lote || '').trim();
    if (loteNome) {
      loteId = mapaLotes.get(`${fazendaId}|${normalizarTexto(loteNome)}`);
      if (!loteId) { erro(`Lote "${loteNome}" não encontrado nessa fazenda.`); continue; }
    }

    let mangaId = null;
    const mangaNumero = String(linha.manga || '').trim();
    if (mangaNumero) {
      mangaId = mapaMangas.get(`${fazendaId}|${normalizarTexto(mangaNumero)}`);
      if (!mangaId) { erro(`Manga "${mangaNumero}" não encontrada nessa fazenda.`); continue; }
    }

    let categoria = null;
    const categoriaTexto = String(linha.categoria || '').trim();
    if (categoriaTexto) {
      categoria = mapaCategorias.get(normalizarTexto(categoriaTexto));
      if (!categoria) { erro(`Categoria "${categoriaTexto}" inválida (use Bezerro, Bezerra, Garrote, Novilho, Novilha, Boi, Vaca, Touro, Matrona ou Vaca seca).`); continue; }
    }

    const castradoTexto = normalizarTexto(linha.castrado);
    const castrado = castradoTexto === 'sim' || castradoTexto === 'true' || castradoTexto === '1';

    const payload = {
      brinco, sexo, categoria,
      raca: String(linha.raca || '').trim() || null,
      pelagem: String(linha.pelagem || '').trim() || null,
      marca: String(linha.marca || '').trim() || null,
      castrado,
      fazenda_id: fazendaId,
      lote_id: loteId,
      manga_id: mangaId,
      data_nascimento: excelDateParaISO(linha.datanascimento),
      data_desmame: excelDateParaISO(linha.datadesmame),
      data_entrada: dataEntrada,
      produtor_origem: String(linha.produtororigem || '').trim() || null,
      peso_entrada: pesoEntrada,
      preco_compra_kg: linha.precocomprakg ? parseFloat(String(linha.precocomprakg).replace(',', '.')) : null,
      frete_compra: linha.fretecompra ? parseFloat(String(linha.fretecompra).replace(',', '.')) : 0,
      observacoes: String(linha.observacoes || '').trim() || null,
    };

    validos.push({ linha: linha.__linha, brinco, payload });
  }

  for (const item of validos) {
    const { error } = await supabaseClient.from('animais').insert(item.payload);
    if (error) {
      const motivo = error.code === '23505' ? 'Já existe um animal com esse brinco.' : error.message;
      resultados.push({ linha: item.linha, brinco: item.brinco, status: 'erro', motivo });
    } else {
      resultados.push({ linha: item.linha, brinco: item.brinco, status: 'ok', motivo: 'Importado com sucesso.' });
    }
  }

  resultados.sort((a, b) => a.linha - b.linha);
  renderResultadoImportacao('tabelaResultadoAnimais', 'cardResultadoAnimais', resultados);

  const sucesso = resultados.filter(r => r.status === 'ok').length;
  btn.disabled = false;
  showMsg('msgImportAnimais', `${sucesso} de ${resultados.length} linha(s) importada(s) com sucesso.`, sucesso === resultados.length ? 'success' : 'error');

  if (sucesso > 0) carregarAnimais();
}

async function processarPlanilhaPesagens() {
  const file = document.getElementById('arquivoPesagens').files[0];
  if (!file) { showMsg('msgImportPesagens', 'Selecione um arquivo .xlsx primeiro.', 'error'); return; }

  const btn = document.getElementById('btnProcessarPesagens');
  btn.disabled = true;
  showMsg('msgImportPesagens', 'Lendo planilha...', 'success');

  let linhas;
  try {
    linhas = await lerArquivoComoLinhas(file);
  } catch (err) {
    btn.disabled = false;
    showMsg('msgImportPesagens', 'Erro ao ler o arquivo: ' + err.message, 'error');
    return;
  }

  if (linhas.length === 0) {
    btn.disabled = false;
    showMsg('msgImportPesagens', 'A planilha não tem linhas de dados (ou só tem a linha de exemplo apagada).', 'error');
    return;
  }

  const { data: animais } = await supabaseClient.from('animais').select('id, brinco');
  const mapaBrincos = new Map((animais || []).map(a => [normalizarTexto(a.brinco), a.id]));

  const resultados = [];
  const validos = [];

  for (const linha of linhas) {
    const brinco = String(linha.brinco || '').trim();
    const erro = (msg) => resultados.push({ linha: linha.__linha, brinco: brinco || '—', status: 'erro', motivo: msg });

    if (!brinco) { erro('Brinco em branco.'); continue; }

    const animalId = mapaBrincos.get(normalizarTexto(brinco));
    if (!animalId) { erro('Brinco não encontrado no cadastro de animais.'); continue; }

    const dataPesagem = excelDateParaISO(linha.datapesagem);
    if (!dataPesagem) { erro('Data de pesagem inválida ou em branco.'); continue; }

    const peso = parseFloat(String(linha.peso).replace(',', '.'));
    if (!peso) { erro('Peso inválido ou em branco.'); continue; }

    validos.push({ linha: linha.__linha, brinco, payload: { animal_id: animalId, data_pesagem: dataPesagem, peso } });
  }

  for (const item of validos) {
    const { error } = await supabaseClient.from('pesagens').insert(item.payload);
    const motivo = error
      ? (error.code === '23505'
          ? `Já existe pesagem registrada pra esse animal em ${new Date(item.payload.data_pesagem + 'T00:00:00').toLocaleDateString('pt-BR')}.`
          : error.message)
      : 'Importado com sucesso.';
    resultados.push({
      linha: item.linha, brinco: item.brinco,
      status: error ? 'erro' : 'ok',
      motivo,
    });
  }

  resultados.sort((a, b) => a.linha - b.linha);
  renderResultadoImportacao('tabelaResultadoPesagens', 'cardResultadoPesagens', resultados);

  const sucesso = resultados.filter(r => r.status === 'ok').length;
  btn.disabled = false;
  showMsg('msgImportPesagens', `${sucesso} de ${resultados.length} linha(s) importada(s) com sucesso.`, sucesso === resultados.length ? 'success' : 'error');
}

// ---------- Modal: transferência ----------
async function abrirModalTransferencia(animalId, brinco) {
  acaoAnimalId = animalId;
  acaoAnimalBrinco = brinco;
  document.getElementById('modalTransferenciaTitulo').textContent = `Transferir animal — #${brinco}`;
  document.getElementById('msgTransferencia').className = 'msg';
  document.getElementById('modalTransferencia').style.display = 'flex';

  const animal = animaisCache.find(a => a.id === animalId);

  const selFazenda = document.getElementById('t_fazenda_id');
  const { data: fazendas } = await supabaseClient.from('fazendas').select('id, nome').order('nome');
  selFazenda.innerHTML = `<option value="">Selecione...</option>` +
    (fazendas || []).map(f => `<option value="${f.id}">${f.nome}</option>`).join('');

  if (animal) {
    selFazenda.value = animal.fazenda_id || '';
    await carregarLotesEMangas(animal.fazenda_id, animal.lote_id, animal.manga_id, 't_lote_id', 't_manga_id');
  }
}

async function salvarTransferencia() {
  const fazendaId = document.getElementById('t_fazenda_id').value;
  if (!fazendaId) { showMsg('msgTransferencia', 'Selecione a fazenda de destino.', 'error'); return; }

  const btn = document.getElementById('btnSalvarTransferencia');
  btn.disabled = true;

  const { error } = await supabaseClient.from('animais').update({
    fazenda_id: fazendaId,
    lote_id: document.getElementById('t_lote_id').value || null,
    manga_id: document.getElementById('t_manga_id').value || null,
  }).eq('id', acaoAnimalId);

  btn.disabled = false;

  if (error) {
    showMsg('msgTransferencia', 'Erro ao transferir: ' + error.message, 'error');
    return;
  }

  fecharModal('modalTransferencia');
  carregarAnimais();
}

// ---------- Modal genérico ----------
function fecharModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

(async function init() {
  await checkAuth();
  showUserEmail();
  document.getElementById('a_data_entrada').value = new Date().toISOString().slice(0, 10);
  carregarAnimais();
})();
</script>
